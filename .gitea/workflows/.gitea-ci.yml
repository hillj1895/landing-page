name: Gitea Actions Demo
run-name: ${{ gitea.actor }} is testing out Gitea Actions 🚀
on: [push]

jobs:
  Explore-Gitea-Actions:
    runs-on: ubuntu-latest
    steps:
      - name: Set Minio Alias
        run: |
          mc alias set minio http://192.168.4.129 gitea-user GiteaSecret123
      - name: Upload index.html to Minio
        run: |
          mc cp index.html minio/jbunkerhill.com/index.html